name: Build, test, and package

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mascotrender-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC 13 static Release + CLI
            runner: ubuntu-24.04
            profile: profiles/linux-x86_64-gcc13-release
            lockfile: locks/linux-x86_64-gcc13-release.lock
            shared: "False"
            cli: "True"
          - name: Linux GCC 13 shared Debug
            runner: ubuntu-24.04
            profile: profiles/linux-x86_64-gcc13-debug
            lockfile: locks/linux-x86_64-gcc13-release.lock
            shared: "True"
            cli: "False"
          - name: Windows MSVC 19.4x static Release + CLI
            runner: windows-2022
            profile: profiles/windows-x86_64-msvc194-release
            lockfile: locks/windows-x86_64-msvc194-release.lock
            shared: "False"
            cli: "True"
          - name: Windows MSVC 19.4x shared Release
            runner: windows-2022
            profile: profiles/windows-x86_64-msvc194-release
            lockfile: locks/windows-x86_64-msvc194-release.lock
            shared: "True"
            cli: "False"

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Conan
        run: |
          python -m pip install "conan>=2.16,<3"
          conan profile detect --force
      - name: Create and test package
        shell: bash
        run: >-
          conan create .
          -pr:h "${{ matrix.profile }}"
          -pr:b default
          --lockfile="${{ matrix.lockfile }}"
          --build=missing
          -o "&:shared=${{ matrix.shared }}"
          -o "&:with_cli=${{ matrix.cli }}"

  sanitizers:
    name: Linux Clang 18 ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Conan
        run: |
          python -m pip install "conan>=2.16,<3"
          conan profile detect --force
      - name: Install dependencies
        run: >-
          conan install .
          -pr:h profiles/linux-x86_64-clang18-debug
          -pr:b default
          --lockfile=locks/linux-x86_64-gcc13-release.lock
          --build=missing
      - name: Configure sanitizer build
        run: >-
          cmake --preset conan-debug
          -DMASCOTRENDER_BUILD_TESTS=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build --preset conan-debug --parallel 2
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --preset conan-debug --output-on-failure
