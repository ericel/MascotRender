name: Build, test, and package

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mascotrender-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sticker-review:
    name: 50-sticker review bundle
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Conan
        run: |
          python -m pip install "conan>=2.16,<3"
          conan profile detect --force
      - name: Install dependencies
        run: >-
          conan install .
          -pr:h profiles/linux-x86_64-gcc13-release
          -pr:b default
          --lockfile=locks/linux-x86_64-gcc13-release.lock
          --build=missing
      - name: Configure and build CLI
        run: |
          cmake --preset conan-release
          cmake --build --preset conan-release --parallel 2
      - name: Generate and verify review bundle
        run: |
          python tools/generate_mascot_packs.py \
            --output generated/mascots --count 5 --seed 20260713
          python tools/render_mascot_packs.py \
            --input generated/mascots \
            --output generated/bundle \
            --mascotrender build/Release/mascotrender
          python tools/build_sticker_review.py \
            --input generated/bundle --expected-count 50
      - name: Upload review bundle
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: mascotrender-50-sticker-review-${{ github.sha }}
          path: generated/bundle
          if-no-files-found: error
          retention-days: 14

  package:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC 13 static Release + CLI
            runner: ubuntu-24.04
            profile: profiles/linux-x86_64-gcc13-release
            lockfile: locks/linux-x86_64-gcc13-release.lock
            shared: "False"
            cli: "True"
          - name: Linux GCC 13 shared Debug
            runner: ubuntu-24.04
            profile: profiles/linux-x86_64-gcc13-debug
            lockfile: locks/linux-x86_64-gcc13-release.lock
            shared: "True"
            cli: "False"
          - name: macOS arm64 AppleClang 21 static Release + CLI
            runner: macos-26
            profile: profiles/macos-armv8-release
            lockfile: conan.lock
            shared: "False"
            cli: "True"
          - name: Windows MSVC 19.4x static Release + CLI
            runner: windows-2022
            profile: profiles/windows-x86_64-msvc194-release
            lockfile: locks/windows-x86_64-msvc194-release.lock
            shared: "False"
            cli: "True"
          - name: Windows MSVC 19.4x shared Release
            runner: windows-2022
            profile: profiles/windows-x86_64-msvc194-release
            lockfile: locks/windows-x86_64-msvc194-release.lock
            shared: "True"
            cli: "False"

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Conan
        run: |
          python -m pip install "conan>=2.16,<3"
          conan profile detect --force
      - name: Create and test package
        shell: bash
        run: >-
          conan create .
          -pr:h "${{ matrix.profile }}"
          -pr:b default
          --lockfile="${{ matrix.lockfile }}"
          --build=missing
          -o "&:shared=${{ matrix.shared }}"
          -o "&:with_cli=${{ matrix.cli }}"

  sanitizers:
    name: Linux Clang 18 ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Conan
        run: |
          python -m pip install "conan>=2.16,<3"
          conan profile detect --force
      - name: Install dependencies
        run: >-
          conan install .
          -pr:h profiles/linux-x86_64-clang18-debug
          -pr:b default
          --lockfile=locks/linux-x86_64-gcc13-release.lock
          --build=missing
      - name: Configure sanitizer build
        run: >-
          cmake --preset conan-debug
          -DMASCOTRENDER_BUILD_TESTS=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr"
      - name: Build
        run: cmake --build --preset conan-debug --parallel 2
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --preset conan-debug --output-on-failure

  filament:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64 Filament GLB
            runner: macos-26
            profile: profiles/macos-armv8-release
            lockfile: locks/macos-armv8-filament-release.lock
            review: true
          - name: Linux Clang 18 libc++ Filament GLB
            runner: ubuntu-24.04
            profile: profiles/linux-x86_64-clang18-libcxx-release
            lockfile: locks/linux-x86_64-filament-release.lock
            review: false
          - name: Windows MSVC 19.4x Filament GLB
            runner: windows-2022
            profile: profiles/windows-x86_64-msvc194-release
            lockfile: locks/windows-x86_64-filament-release.lock
            review: false

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Conan
        run: |
          python -m pip install "conan>=2.16,<3" "pillow>=11,<13"
          conan profile detect --force
      - name: Install Linux Filament runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc++-18-dev libc++abi-18-dev \
            libegl1 libgl1-mesa-dri mesa-vulkan-drivers xvfb
      - name: Create and test Filament package on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: >-
          xvfb-run -a conan create recipes/filament
          -pr:h "${{ matrix.profile }}"
          -pr:b default
          --build=missing
      - name: Create and test Filament package
        if: runner.os != 'Linux'
        shell: bash
        run: >-
          conan create recipes/filament
          -pr:h "${{ matrix.profile }}"
          -pr:b default
          --build=missing
      - name: Install Filament-enabled dependencies
        shell: bash
        run: >-
          conan install .
          -pr:h "${{ matrix.profile }}"
          -pr:b default
          --lockfile="${{ matrix.lockfile }}"
          --build=missing
          -o "&:with_filament=True"
          -o "&:with_cli=True"
      - name: Configure Filament build
        shell: bash
        run: >-
          cmake --preset conan-release
          -DMASCOTRENDER_BUILD_TESTS=ON
      - name: Build
        shell: bash
        run: cmake --build --preset conan-release --parallel 3
      - name: Test GLB loader and existing engine on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a ctest --preset conan-release --output-on-failure
      - name: Test GLB loader and existing engine on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: ctest --preset conan-release --output-on-failure
      - name: Test package and non-GPU engine paths on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: >-
          ctest --preset conan-release --output-on-failure
          -E "Filament|authored robot"
      - name: Render robot GLB review
        if: matrix.review
        shell: bash
        run: >-
          python tools/render_robot_glb_review.py
          --renderer build/Release/mascotrender-glb-preview
          --input examples/robot-004/robot-004.glb
          --output generated/robot-004-review
      - name: Upload robot GLB review
        if: matrix.review
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: mascotrender-robot-004-review-${{ github.sha }}
          path: generated/robot-004-review
          if-no-files-found: error
          retention-days: 14
